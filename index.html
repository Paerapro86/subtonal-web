<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subtonal AI</title>
  <meta name="description" content="Subtonal AI — coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #07070f;
      --accent:  #5d5fef;
      --glow:    rgba(93, 95, 239, 0.18);
      --text:    #f5f5ff;
      --muted:   rgba(245, 245, 255, 0.42);
      --border:  rgba(93, 95, 239, 0.28);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── noise grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
    }

    /* ── radial ambient glow ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 70% 55% at 50% 52%, rgba(93,95,239,0.11) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── canvas waveform ── */
    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ── main content ── */
    .stage {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
    }

    /* logo badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.3rem 0.85rem;
      margin-bottom: 2.2rem;
      backdrop-filter: blur(8px);
      background: rgba(93,95,239,0.06);
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px 2px rgba(93,95,239,0.6);
      animation: pulse 2.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.75); }
    }

    .badge-label {
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* wordmark */
    .wordmark {
      font-size: clamp(3rem, 9vw, 5.5rem);
      font-weight: 200;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      line-height: 1;
      background: linear-gradient(160deg, #ffffff 20%, rgba(255,255,255,0.55) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.6rem;
    }

    /* thin rule */
    .rule {
      width: 32px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin-bottom: 1.6rem;
    }

    /* tagline */
    .tagline {
      font-size: clamp(0.875rem, 2.4vw, 1.05rem);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-align: center;
      max-width: 360px;
      line-height: 1.7;
      margin-bottom: 2.8rem;
    }

    /* email form */
    .pilot-note {
      font-size: clamp(0.75rem, 2vw, 0.875rem);
      font-weight: 400;
      color: rgba(245,245,255,0.55);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .form-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
    }

    .notify-form {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .notify-form:focus-within {
      border-color: rgba(93,95,239,0.65);
      box-shadow: 0 0 0 3px rgba(93,95,239,0.1);
    }

    .notify-form input[type="email"] {
      background: transparent;
      border: none;
      outline: none;
      padding: 0.75rem 1.1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.855rem;
      font-weight: 300;
      width: clamp(180px, 38vw, 230px);
    }

    .notify-form input::placeholder { color: var(--muted); }

    .notify-form button {
      background: var(--accent);
      border: none;
      padding: 0.75rem 1.35rem;
      color: #fff;
      font-family: inherit;
      font-size: 0.83rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .notify-form button:hover { background: #4a4cdf; }
    .notify-form button:active { background: #3c3eb5; }

    .form-note {
      font-size: 0.68rem;
      color: rgba(245,245,255,0.22);
      letter-spacing: 0.05em;
    }

    /* success state */
    .success {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .success-icon {
      font-size: 1.3rem;
      opacity: 0.8;
    }

    .success-text {
      font-size: 0.875rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* footer */
    .footer {
      position: fixed;
      bottom: 1.8rem;
      left: 0;
      right: 0;
      z-index: 3;
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: rgba(245,245,255,0.14);
      text-transform: uppercase;
    }

    /* fade-in on load */
    .stage { animation: fadeIn 1.1s ease both; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="wave"></canvas>

  <main class="stage">

    <div class="badge">
      <span class="badge-dot"></span>
      <span class="badge-label">Closed Pilot</span>
    </div>

    <h1 class="wordmark">Subtonal</h1>
    <div class="rule"></div>

    <p class="tagline">Hear what your sales calls already know.</p>

    <p class="pilot-note">Limited to 5 spots for corporate groups.</p>

    <div class="form-wrap" id="formWrap">
      <form class="notify-form" id="notifyForm" autocomplete="off">
        <input type="email" placeholder="Work email" required>
        <button type="submit">Apply for a spot</button>
      </form>
      <span class="form-note">We'll be in touch within 24 hours.</span>
    </div>

    <div class="success" id="successState">
      <div class="success-icon">&#10003;</div>
      <p class="success-text">You're on the list.</p>
    </div>

  </main>

  <footer class="footer">© 2026 Subtonal AI</footer>

  <script>
    /* ── Waveform ── */
    (function () {
      const canvas = document.getElementById('wave');
      const ctx = canvas.getContext('2d');
      let W, H, t = 0;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      /* Each wave: amplitude (% of half-height), frequency, phase offset, alpha, lineWidth */
      const waves = [
        { a: 0.062, f: 2.1,  p: 0,    al: 0.38, lw: 1.6 },
        { a: 0.038, f: 3.6,  p: 1.3,  al: 0.22, lw: 1.1 },
        { a: 0.048, f: 1.4,  p: 0.7,  al: 0.17, lw: 1.3 },
        { a: 0.022, f: 5.2,  p: 2.5,  al: 0.11, lw: 0.7 },
        { a: 0.015, f: 7.8,  p: 3.9,  al: 0.07, lw: 0.5 },
      ];

      function draw() {
        ctx.clearRect(0, 0, W, H);
        t += 0.006;

        waves.forEach(w => {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(93,95,239,${w.al})`;
          ctx.lineWidth   = w.lw;
          ctx.shadowBlur  = 10;
          ctx.shadowColor = `rgba(93,95,239,0.25)`;

          for (let x = 0; x <= W; x += 1.5) {
            const norm     = x / W;
            const envelope = Math.pow(Math.sin(norm * Math.PI), 0.6);
            const y        = H / 2 + Math.sin(norm * w.f * Math.PI * 2 + t * 1.8 + w.p) * (H / 2) * w.a * envelope;
            x < 1.5 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.stroke();
        });

        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ── Form ── */
    document.getElementById('notifyForm').addEventListener('submit', function (e) {
      e.preventDefault();
      document.getElementById('formWrap').style.display  = 'none';
      const s = document.getElementById('successState');
      s.style.display = 'flex';
    });
  </script>
</body>
</html>
